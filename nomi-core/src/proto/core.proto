syntax = "proto3";

package nomi.core;

// ── Service ──────────────────────────────────────────────────────────────────

service CoreService {
  rpc Execute (ExecutionRequest) returns (ExecutionResponse);
  rpc GetCostByUser (CostByUserRequest) returns (CostSummary);
  rpc GetCostByFeature (CostByFeatureRequest) returns (CostSummary);
  rpc Health (Empty) returns (HealthResponse);
}

// ── Health ────────────────────────────────────────────────────────────────────

message Empty {}

// timestamp_ms is int64 epoch milliseconds (UTC)
message HealthResponse {
  string status = 1;
  int64 timestamp_ms = 2;
}

// ── Execution — shared types ──────────────────────────────────────────────────

// Ties all logs and cost records to a single user request across services
message ExecutionTrace {
  string user_id = 1;
  string feature_id = 2;
  string trace_id = 3;
}

// Maps to AI SDK string roles in the controller: USER→'user', ASSISTANT→'assistant', SYSTEM→'system'
enum ChatRole {
  CHAT_ROLE_UNSPECIFIED = 0;
  CHAT_ROLE_USER = 1;
  CHAT_ROLE_ASSISTANT = 2;
  CHAT_ROLE_SYSTEM = 3;
}

message ChatMessage {
  ChatRole role = 1;
  string content = 2;
}

// Identifies which LLM provider and model to use for a request
message ProviderConfig {
  string name = 1;                    // provider name (e.g. 'gemini')
  string model = 2;                   // model id (e.g. 'gemini-2.0-flash')
  optional double temperature = 3;
  optional int32 max_output_tokens = 4;
}

// ── Execution — request / response ───────────────────────────────────────────

// Controls retry and fallback behaviour; omit to use engine defaults (3 retries, 30s timeout)
message ExecutionPolicy {
  optional int32 max_retries = 1;
  optional int32 timeout_ms = 2;
  optional ProviderConfig fallback_provider = 3; // used if primary provider exhausts all retries
}

message ExecutionRequest {
  repeated ChatMessage messages = 1;
  ProviderConfig provider = 2;
  optional ExecutionPolicy policy = 3;
  ExecutionTrace trace = 4;
}

message TokenUsage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 total_tokens = 3;
}

message ExecutionResponse {
  string raw = 1;                   // raw LLM output text
  optional string parsed_json = 2;  // present only when Zod schema validation succeeded
  bool valid = 3;                   // false if LLM failed or schema validation failed
  TokenUsage usage = 4;
  CostRecord cost = 5;
  int32 duration_ms = 6;
  int32 attempt = 7;                // which attempt number succeeded (1-based)
  string trace_id = 8;
  optional string error = 9;        // present when valid=false
  string provider = 10;             // which provider actually served the response
  string model = 11;                // which model actually served the response
}

// ── Cost ──────────────────────────────────────────────────────────────────────

// Embedded in ExecutionResponse and stored per request for cost tracking
message CostRecord {
  ExecutionTrace trace = 1;
  string provider = 2;
  string model = 3;
  double input_cost = 4;
  double output_cost = 5;
  double total_cost = 6;
  string timestamp = 7; // ISO 8601 UTC
}

// Query cost aggregated by user
message CostByUserRequest {
  string user_id = 1;
}

// Query cost aggregated by feature
message CostByFeatureRequest {
  string feature_id = 1;
}

message CostSummary {
  double total_cost = 1;
  int32 request_count = 2;
}
